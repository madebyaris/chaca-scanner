name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri'

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Chaca v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Zip macOS app for direct run
        if: matrix.platform == 'macos-latest'
        run: |
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          cd src-tauri/target/release/bundle/macos
          zip -r Chaca_${VERSION}_aarch64.app.zip Chaca.app
          mv Chaca_*.app.zip ${{ github.workspace }}/

      - name: Upload macOS app zip
        if: matrix.platform == 'macos-latest'
        run: |
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          TAG="v${VERSION}"
          gh release upload ${TAG} Chaca_${VERSION}_aarch64.app.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows portable exe
        if: matrix.platform == 'windows-latest'
        run: |
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          TAG="v${VERSION}"
          cp src-tauri/target/release/securescan.exe Chaca_${VERSION}_x64-portable.exe
          gh release upload ${TAG} Chaca_${VERSION}_x64-portable.exe --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
